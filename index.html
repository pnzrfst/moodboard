    <title>Meu Moodboard Dinâmico</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            background-color: #f4f4f4;
            font-family: sans-serif;
        }

        .mood-item {
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 4px;
            transition: all 0.5s ease-out; 
            cursor: move;
        }

        body.js {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div style="margin:auto; width: 50vw; height: 50vh; display: flex; border: 1px solid red; padding: 10px;">
